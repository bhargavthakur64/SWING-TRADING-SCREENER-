<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screener Workspace - Swing Trading</title>
    
    <!-- Global Error Catcher for Diagnostics -->
    <script>
        window.addEventListener('error', function(event) {
            // Wait for body to load if error occurs early
            setTimeout(function() {
                const errorDiv = document.createElement('div');
                errorDiv.style.position = 'fixed';
                errorDiv.style.top = '10px';
                errorDiv.style.left = '10px';
                errorDiv.style.right = '10px';
                errorDiv.style.padding = '16px';
                errorDiv.style.background = '#ea3434';
                errorDiv.style.color = '#ffffff';
                errorDiv.style.fontFamily = 'monospace';
                errorDiv.style.fontSize = '14px';
                errorDiv.style.borderRadius = '6px';
                errorDiv.style.zIndex = '999999';
                errorDiv.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
                errorDiv.innerHTML = '<strong>Frontend Diagnostics Error:</strong><br><br>' + 
                                     'Message: ' + event.message + '<br>' +
                                     'Source: ' + event.filename + ':' + event.lineno + '<br><br>' +
                                     'Please share this error message!';
                document.body.appendChild(errorDiv);
            }, 100);
        });
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM (Served Locally) -->
    <script src="/static/react.min.js"></script>
    <script src="/static/react-dom.min.js"></script>
    
    <!-- Babel for JSX (Served Locally) -->
    <script src="/static/babel.min.js"></script>
    
    <!-- TradingView Lightweight Charts (Served Locally) -->
    <script src="/static/lightweight-charts.js"></script>

    <!-- Vanilla CSS Design System (TradingView & FintaTech Inspired) -->
    <style>
        :root {
            --bg-workspace: #080c10;
            --bg-sidebar: #131722;
            --bg-chart: #000000;
            --border-color: #2a2e39;
            --border-hover: #363c4e;
            
            --text-primary: #d1d4dc;
            --text-secondary: #848e9c;
            --text-muted: #4c525e;
            
            --accent-cyan: #00f2fe;
            --accent-blue: #2196f3;
            --success-color: #089981;
            --error-color: #f23645;
            
            --success-bg: rgba(8, 153, 129, 0.12);
            --error-bg: rgba(242, 54, 69, 0.12);
            --warning-bg: rgba(255, 152, 0, 0.12);
            --warning-color: #ff9800;
            
            --font-inter: 'Inter', sans-serif;
            --font-outfit: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-inter);
            background-color: var(--bg-workspace);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Navbar */
        .navbar {
            height: 48px;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 10;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-logo {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #00f2fe 0%, #2196f3 100%);
            border-radius: 4px;
        }

        .navbar-title {
            font-family: var(--font-outfit);
            font-weight: 700;
            font-size: 1.1rem;
            color: #ffffff;
            letter-spacing: -0.2px;
        }

        .navbar-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Workspace Grid Layout */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 48px);
            overflow: hidden;
        }

        /* Left Sidebar (Watchlist & Configs) */
        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        /* Inputs & Selects */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        select, input[type="date"] {
            background-color: #1e222d;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 10px;
            color: #ffffff;
            font-family: var(--font-inter);
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
            width: 100%;
        }

        select:focus, input[type="date"]:focus {
            border-color: var(--accent-blue);
        }

        /* Search input */
        .search-container {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-box {
            background-color: #1e222d;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 10px;
            color: #ffffff;
            outline: none;
            font-size: 0.85rem;
            width: 100%;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: var(--accent-blue);
        }

        /* Stocks Scrollable List */
        .stocks-list-container {
            flex: 1;
            overflow-y: auto;
        }

        .stock-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .stock-item:hover {
            background-color: #1e222d;
        }

        .stock-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stock-ticker {
            font-weight: 600;
            color: #ffffff;
            font-size: 0.85rem;
        }

        .stock-name {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .stock-perf {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .stock-price {
            font-size: 0.85rem;
            font-family: monospace;
        }

        .stock-change {
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Right Content Panel (Chart Canvas) */
        .chart-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-workspace);
            overflow: hidden;
        }

        /* Chart Header Toolbar */
        .chart-toolbar {
            height: 40px;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .chart-title-line {
            font-size: 0.75rem;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: monospace;
        }

        .chart-legend-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .toolbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-toggle-overlay {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-toggle-overlay.active {
            background-color: var(--accent-blue);
            color: #ffffff;
            border-color: var(--accent-blue);
        }

        .btn-toggle-overlay:hover {
            color: #ffffff;
            border-color: var(--border-hover);
        }

        /* Relative Chart Canvas container */
        .chart-canvas-container {
            flex: 1;
            position: relative;
            background-color: var(--bg-chart);
            overflow: hidden;
        }

        /* Floating Overlays */
        .tv-overlay-card {
            position: absolute;
            background-color: rgba(19, 23, 34, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
            padding: 6px;
            font-size: 11px;
            color: #d1d4dc;
        }

        .tv-returns-card {
            top: 16px;
            right: 64px; /* offset for chart y-axis */
            width: 130px;
        }

        .tv-performance-card {
            bottom: 56px; /* offset for time-range bar */
            right: 64px;
            width: 270px;
            max-height: 240px;
            overflow-y: auto;
        }

        .tv-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tv-table th {
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 9px;
            padding: 4px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .tv-table td {
            padding: 5px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .tv-table tr:last-child td {
            border-bottom: none;
        }

        .tv-table tr.tv-row-baseline td {
            background-color: rgba(0, 242, 254, 0.05);
            font-weight: 600;
        }

        .tv-td-label {
            font-weight: 600;
            color: #ffffff;
        }

        .tv-td-val {
            text-align: right;
            font-family: monospace;
        }

        .tv-pos {
            color: var(--success-color);
        }

        .tv-neg {
            color: var(--error-color);
        }

        /* Time Range Selector Bar (TradingView style at bottom) */
        .chart-timebar {
            height: 38px;
            background-color: var(--bg-sidebar);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .timebar-ranges {
            display: flex;
            gap: 4px;
        }

        .timebar-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .timebar-btn:hover {
            color: #ffffff;
            background-color: #1e222d;
        }

        .timebar-btn.active {
            color: var(--accent-blue);
            background-color: rgba(33, 150, 243, 0.1);
        }

        /* Configuration Alert Panels */
        .full-screen-alert {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            background-color: var(--bg-workspace);
            padding: 24px;
        }

        .alert-panel {
            background-color: var(--bg-sidebar);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .alert-title {
            font-family: var(--font-outfit);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--warning-color);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-text {
            color: var(--text-primary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .alert-text ol {
            margin-left: 20px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-action {
            background: linear-gradient(135deg, #00f2fe 0%, #2196f3 100%);
            color: #080c10;
            font-weight: 700;
            border: none;
            border-radius: 4px;
            padding: 10px 16px;
            cursor: pointer;
            font-family: var(--font-inter);
            font-size: 0.85rem;
            transition: transform 0.1s;
        }

        .btn-action:active {
            transform: scale(0.98);
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-sidebar);
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2e39;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #363c4e;
        }

        /* Loading Spinner */
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(0, 242, 254, 0.1);
            border-top: 3px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Styles for chart canvas wrapper */
        .chart-canvas-container {
            position: relative;
            flex: 1;
            background-color: var(--bg-chart);
            border-bottom: 1px solid var(--border-color);
            min-height: 480px; /* Keep height constrained and positive */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom SVG icons
        const ConnectIcon = () => (
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{display:'inline-block'}}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
        );

        // Chart Component using native TradingView Lightweight Charts
        function TradingViewChart({ chartData, resetTrigger }) {
            const containerRef = useRef(null);
            const chartInstance = useRef(null);
            const navSeriesRef = useRef(null);
            const ema20SeriesRef = useRef(null);
            const ema50SeriesRef = useRef(null);
            const ema200SeriesRef = useRef(null);

            useEffect(() => {
                if (!containerRef.current || !chartData || chartData.length === 0) return;

                // Clear previous contents
                containerRef.current.innerHTML = '';

                // Determine initial dimensions with safe positive fallbacks
                const width = containerRef.current.clientWidth || 800;
                const height = containerRef.current.clientHeight || 480;

                // Create the TradingView chart
                const chart = LightweightCharts.createChart(containerRef.current, {
                    width: width,
                    height: height,
                    layout: {
                        background: { type: 'solid', color: '#000000' },
                        backgroundColor: '#000000', // backward compatibility
                        textColor: '#d1d4dc',
                        fontSize: 11,
                        fontFamily: 'Inter, sans-serif',
                    },
                    grid: {
                        vertLines: { color: '#131722', style: 2 }, // dotted style
                        horzLines: { color: '#131722', style: 2 },
                    },
                    rightPriceScale: {
                        borderColor: '#2a2e39',
                        visible: true,
                        alignLabels: true,
                    },
                    timeScale: {
                        borderColor: '#2a2e39',
                        timeVisible: false,
                        secondsVisible: false,
                        rightOffset: 12,
                        barSpacing: 6,
                        fixLeftEdge: true,
                    },
                    crosshair: {
                        mode: LightweightCharts.CrosshairMode.Normal,
                        vertLine: {
                            color: '#758696',
                            width: 1,
                            style: 3, // dashed
                            labelBackgroundColor: '#131722',
                        },
                        horzLine: {
                            color: '#758696',
                            width: 1,
                            style: 3,
                            labelBackgroundColor: '#131722',
                        },
                    },
                    handleScale: {
                        mouseWheel: true,
                        pinch: true,
                        axisPressedMouseMove: {
                            time: true,
                            price: true,
                        },
                    },
                    handleScroll: {
                        mouseWheel: true,
                        pressedMouseMove: true,
                        horzTouchDrag: true,
                        vertTouchDrag: true,
                    },
                });

                chartInstance.current = chart;

                // Add series with matching TradingView colors (unified v5 API)
                const navSeries = chart.addSeries(LightweightCharts.LineSeries, {
                    color: '#ffffff',
                    lineWidth: 2.5,
                    priceLineVisible: false,
                    lastValueVisible: true,
                });
                
                const ema20Series = chart.addSeries(LightweightCharts.LineSeries, {
                    color: '#ff9800',
                    lineWidth: 1.5,
                    priceLineVisible: false,
                    lastValueVisible: true,
                });

                const ema50Series = chart.addSeries(LightweightCharts.LineSeries, {
                    color: '#e5c158',
                    lineWidth: 1.5,
                    priceLineVisible: false,
                    lastValueVisible: true,
                });

                const ema200Series = chart.addSeries(LightweightCharts.LineSeries, {
                    color: '#ea3434',
                    lineWidth: 2.0,
                    priceLineVisible: false,
                    lastValueVisible: true,
                });

                // Format data: time must be in 'YYYY-MM-DD'
                const navData = chartData.map(d => ({ time: d.date, value: d.nav }));
                const ema20Data = chartData.map(d => ({ time: d.date, value: d.ema20 })).filter(d => d.value !== null && !isNaN(d.value));
                const ema50Data = chartData.map(d => ({ time: d.date, value: d.ema50 })).filter(d => d.value !== null && !isNaN(d.value));
                const ema200Data = chartData.map(d => ({ time: d.date, value: d.ema200 })).filter(d => d.value !== null && !isNaN(d.value));

                navSeries.setData(navData);
                ema20Series.setData(ema20Data);
                ema50Series.setData(ema50Data);
                ema200Series.setData(ema200Data);

                // Auto fit content
                chart.timeScale().fitContent();

                navSeriesRef.current = navSeries;
                ema20SeriesRef.current = ema20Series;
                ema50SeriesRef.current = ema50Series;
                ema200SeriesRef.current = ema200Series;

                // ResizeObserver for modern layout and scaling updates
                const resizeObserver = new ResizeObserver(entries => {
                    if (!entries || entries.length === 0) return;
                    const { width, height } = entries[0].contentRect;
                    if (chartInstance.current && width > 0 && height > 0) {
                        chartInstance.current.resize(width, height);
                    }
                });
                resizeObserver.observe(containerRef.current);

                return () => {
                    resizeObserver.disconnect();
                    if (chartInstance.current) {
                        chartInstance.current.remove();
                        chartInstance.current = null;
                    }
                };
            }, [chartData]);

            // Listen for reset trigger from parent
            useEffect(() => {
                if (chartInstance.current && resetTrigger > 0) {
                    chartInstance.current.timeScale().fitContent();
                    // Also reset Y-axis scaling (auto scale)
                    chartInstance.current.priceScale('right').applyOptions({
                        autoScale: true
                    });
                }
            }, [resetTrigger]);

            return (
                <div style={{ width: '100%', height: '100%', position: 'relative' }}>
                    <div ref={containerRef} style={{ width: '100%', height: '100%' }}></div>
                </div>
            );
        }

        // Main App Workspace Component
        function App() {
            const [industries, setIndustries] = useState([]);
            const [selectedIndustry, setSelectedIndustry] = useState("");
            const [startDate, setStartDate] = useState("2024-01-01");
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [error, setError] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            const [source, setSource] = useState("");
            
            // Layout Overlays
            const [showReturns, setShowReturns] = useState(true);
            const [showHoldings, setShowHoldings] = useState(true);
            const [timeRange, setTimeRange] = useState("All");
            const [resetTrigger, setResetTrigger] = useState(0);

            // Fetch industries on mount
            useEffect(() => {
                fetchIndustries();
            }, []);

            // Automatically load screener when selected industry or date changes
            useEffect(() => {
                if (selectedIndustry) {
                    fetchScreenerData();
                }
            }, [selectedIndustry, startDate]);

            const fetchIndustries = async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch("/api/industries");
                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.detail || "Failed to load watchlists");
                    }
                    const resData = await response.json();
                    setIndustries(resData.industries);
                    setSource(resData.source);
                    if (resData.industries.length > 0) {
                        setSelectedIndustry(resData.industries[0]);
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const fetchScreenerData = async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch(`/api/screener?industry=${encodeURIComponent(selectedIndustry)}&start_date=${startDate}`);
                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.detail || "Calculation error occurred");
                    }
                    const resData = await response.json();
                    setData(resData);
                    setSource(resData.source);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            // Filter chart data dynamically based on the selected range button
            const getFilteredChartData = () => {
                if (!data || !data.chart_data) return [];
                
                const fullData = data.chart_data;
                if (timeRange === "All") return fullData;

                const today = new Date();
                let cutoffDate = null;

                if (timeRange === "1M") {
                    cutoffDate = new Date();
                    cutoffDate.setMonth(today.getMonth() - 1);
                } else if (timeRange === "3M") {
                    cutoffDate = new Date();
                    cutoffDate.setMonth(today.getMonth() - 3);
                } else if (timeRange === "6M") {
                    cutoffDate = new Date();
                    cutoffDate.setMonth(today.getMonth() - 6);
                } else if (timeRange === "1Y") {
                    cutoffDate = new Date();
                    cutoffDate.setFullYear(today.getFullYear() - 1);
                } else if (timeRange === "YTD") {
                    cutoffDate = new Date(today.getFullYear(), 0, 1);
                }

                if (cutoffDate) {
                    return fullData.filter(item => new Date(item.date) >= cutoffDate);
                }

                return fullData;
            };

            // Filter Stocks list in Left Sidebar
            const getSidebarFilteredStocks = () => {
                if (!data || !data.stocks_performance) return [];
                return data.stocks_performance.filter(stock => 
                    stock.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    stock.ticker.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    stock.isin.toLowerCase().includes(searchQuery.toLowerCase())
                );
            };

            const isAuthError = error && error.includes("401");
            const filteredChartData = getFilteredChartData();
            const sidebarStocks = getSidebarFilteredStocks();
            
            // Format dynamic ticker string list for TradingView header info
            const tickerListStr = data && data.stocks_performance
                ? data.stocks_performance.map(s => s.ticker.split('.')[0]).join('  ')
                : "";

            return (
                <div style={{height: '100vh', display: 'flex', flexDirection: 'column'}}>
                    {/* Top Menu Navbar */}
                    <nav className="navbar">
                        <div className="navbar-brand">
                            <div className="navbar-logo"></div>
                            <span className="navbar-title">Screener Workspace</span>
                        </div>
                        <div className="navbar-status">
                            {source && (
                                <span style={{color: source.includes("Live") ? 'var(--success-color)' : 'var(--accent-blue)', display:'flex', alignItems:'center', gap:'4px'}}>
                                    <ConnectIcon /> Source: {source}
                                </span>
                            )}
                        </div>
                    </nav>

                    <div className="workspace">
                        {/* Left Sidebar Watchlist Configuration */}
                        <div className="sidebar">
                            <div className="sidebar-section">
                                <div className="sidebar-title">Watchlist Configuration</div>
                                <div className="form-group">
                                    <label>Sector Watchlist</label>
                                    <select 
                                        value={selectedIndustry} 
                                        onChange={(e) => setSelectedIndustry(e.target.value)}
                                        disabled={loading || industries.length === 0}
                                    >
                                        {industries.length === 0 ? (
                                            <option value="">No sectors loaded</option>
                                        ) : (
                                            industries.map(ind => (
                                                <option key={ind} value={ind}>{ind}</option>
                                            ))
                                        )}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Portfolio Base Date</label>
                                    <input 
                                        type="date" 
                                        value={startDate} 
                                        onChange={(e) => setStartDate(e.target.value)}
                                        disabled={loading}
                                    />
                                </div>
                            </div>

                            <div className="search-container">
                                <input 
                                    type="text" 
                                    className="search-box" 
                                    placeholder="Quick Search Symbol..." 
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    disabled={loading || !data}
                                />
                            </div>

                            {/* Sidebar Stocks list */}
                            <div className="sidebar-title" style={{padding: '16px 16px 4px 16px', marginBottom: 0}}>
                                Watchlist Stocks ({sidebarStocks.length})
                            </div>
                            <div className="stocks-list-container">
                                {loading && industries.length > 0 && (
                                    <div style={{padding: '30px', textAlign: 'center'}}>
                                        <div className="spinner" style={{width: '24px', height: '24px'}}></div>
                                        <div style={{fontSize: '0.75rem', color: 'var(--text-secondary)'}}>Updating watchlists...</div>
                                    </div>
                                )}
                                
                                {!loading && sidebarStocks.length === 0 && (
                                    <div style={{padding: '24px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '0.8rem'}}>
                                        No tickers in list
                                    </div>
                                )}

                                {!loading && sidebarStocks.map(stock => (
                                    <div className="stock-item" key={stock.ticker}>
                                        <div className="stock-info">
                                            <span className="stock-ticker">{stock.ticker.split('.')[0]}</span>
                                            <span className="stock-name">{stock.name}</span>
                                        </div>
                                        <div className="stock-perf">
                                            <span className="stock-price">{stock.current_price.toFixed(2)}</span>
                                            <span className={`stock-change ${stock.return_pct >= 0 ? "tv-pos" : "tv-neg"}`}>
                                                {stock.return_pct >= 0 ? '+' : ''}{stock.return_pct.toFixed(2)}%
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Right Content Panel - TradingView Chart Canvas */}
                        <div className="chart-panel">
                            {/* Unauthorized Google Sheet Permission Helper */}
                            {isAuthError && (
                                <div className="full-screen-alert">
                                    <div className="alert-panel">
                                        <div className="alert-title">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                            <span>Sheet Access Restricted (401 Error)</span>
                                        </div>
                                        <div className="alert-text">
                                            <p>The Python backend could not fetch your Google Sheet. To resolve this:</p>
                                            <ol>
                                                <li>Open your sheet: <a href="https://docs.google.com/spreadsheets/d/1G_lZbCc74MsJAHUsbTNx6v1KGlCZAiBwxTUU792BAzc/edit?usp=sharing" target="_blank" style={{color:'var(--accent-cyan)'}}>Google Sheets Link</a></li>
                                                <li>Click the **Share** button in the top-right corner.</li>
                                                <li>Change General Access to **"Anyone with the link can view"**.</li>
                                            </ol>
                                            <p style={{marginTop:'12px'}}>
                                                <strong>Offline Fallback:</strong> Download your sheet as a CSV (File > Download > CSV), name it <code>watchlist.csv</code>, and place it in the folder: <code>Swing trading/</code>
                                            </p>
                                        </div>
                                        <button className="btn-action" onClick={fetchIndustries}>Reconnect Live Sheet</button>
                                    </div>
                                </div>
                            )}

                            {/* Standard Error Loader fallback */}
                            {error && !isAuthError && (
                                <div className="full-screen-alert">
                                    <div className="alert-panel" style={{borderColor: 'var(--error-color)'}}>
                                        <div className="alert-title" style={{color: 'var(--error-color)'}}>
                                            <span>Screener Fetch Error</span>
                                        </div>
                                        <div className="alert-text">
                                            <p>{error}</p>
                                        </div>
                                        <button className="btn-action" onClick={fetchIndustries}>Retry loading watchlist</button>
                                    </div>
                                </div>
                            )}

                            {/* Loading Spinner during calculations */}
                            {loading && !error && (
                                <div className="full-screen-alert">
                                    <div style={{textAlign: 'center'}}>
                                        <div className="spinner"></div>
                                        <div style={{color: 'var(--text-secondary)', fontSize: '0.85rem'}}>
                                            Fetching market values and computing portfolio indicator lines...
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Live Active Chart Workspace */}
                            {!loading && data && (
                                <div style={{display: 'flex', flexDirection: 'column', flex: 1}}>
                                    {/* Chart Header Bar */}
                                    <div className="chart-toolbar">
                                        <div className="chart-title-line">
                                            <span>FW - {data.industry.toUpperCase()} BASKET normal</span>
                                            <span className="chart-legend-indicator" style={{color: '#ffffff'}}>
                                                <span className="dot" style={{backgroundColor: '#ffffff'}}></span>
                                                NAV ({data.latest_nav})
                                            </span>
                                            <span className="chart-legend-indicator" style={{color: '#ff9800'}}>
                                                <span className="dot" style={{backgroundColor: '#ff9800'}}></span>
                                                EMA 20
                                            </span>
                                            <span className="chart-legend-indicator" style={{color: '#e5c158'}}>
                                                <span className="dot" style={{backgroundColor: '#e5c158'}}></span>
                                                EMA 50
                                            </span>
                                            <span className="chart-legend-indicator" style={{color: '#ea3434'}}>
                                                <span className="dot" style={{backgroundColor: '#ea3434'}}></span>
                                                EMA 200
                                            </span>
                                        </div>

                                        <div className="toolbar-actions">
                                            <button 
                                                className="btn-toggle-overlay"
                                                onClick={() => setResetTrigger(prev => prev + 1)}
                                            >
                                                Reset Zoom
                                            </button>
                                            <button 
                                                className={`btn-toggle-overlay ${showReturns ? 'active' : ''}`}
                                                onClick={() => setShowReturns(!showReturns)}
                                            >
                                                Returns Overlay
                                            </button>
                                            <button 
                                                className={`btn-toggle-overlay ${showHoldings ? 'active' : ''}`}
                                                onClick={() => setShowHoldings(!showHoldings)}
                                            >
                                                Holdings Overlay
                                            </button>
                                        </div>
                                    </div>

                                    {/* Chart Canvas Area */}
                                    <div className="chart-canvas-container">
                                        {/* Dynamic Ticker Info overlay like TradingView */}
                                        <div style={{
                                            position: 'absolute', 
                                            top: '12px', 
                                            left: '12px', 
                                            zIndex: 5,
                                            fontFamily: 'monospace', 
                                            fontSize: '11px', 
                                            color: 'var(--text-muted)',
                                            maxWidth: '65%',
                                            pointerEvents: 'none',
                                            lineHeight: 1.4
                                        }}>
                                            {data.industry.toUpperCase()} BASKET {data.active_stocks} stocks: {tickerListStr}
                                        </div>

                                        {/* Pure black TradingView chart */}
                                        <TradingViewChart 
                                            chartData={filteredChartData} 
                                            resetTrigger={resetTrigger}
                                        />

                                        {/* Floating overlay 1: Periodic Returns (Top-Right) */}
                                        {showReturns && (
                                            <div className="tv-overlay-card tv-returns-card">
                                                <table className="tv-table">
                                                    <tbody>
                                                        {data.periodic_returns.map(item => (
                                                            <tr key={item.period}>
                                                                <td className="tv-td-label" style={{color: 'var(--text-secondary)'}}>{item.period}</td>
                                                                <td className={`tv-td-val ${item.return_pct >= 0 ? "tv-pos" : "tv-neg"}`} style={{fontWeight: 600}}>
                                                                    {item.return_pct !== null 
                                                                        ? `${item.return_pct >= 0 ? '+' : ''}${item.return_pct.toFixed(2)}%` 
                                                                        : 'N/A'
                                                                    }
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}

                                        {/* Floating overlay 2: Stocks Return vs NAV Performance (Bottom-Right) */}
                                        {showHoldings && (
                                            <div className="tv-overlay-card tv-performance-card">
                                                <table className="tv-table">
                                                    <thead>
                                                        <tr>
                                                            <th>Stock</th>
                                                            <th style={{textAlign: 'right'}}>Return</th>
                                                            <th style={{textAlign: 'right'}}>vs NAV</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {/* Portfolio Baseline Row */}
                                                        <tr className="tv-row-baseline">
                                                            <td style={{color: 'var(--accent-cyan)'}}><strong>NAV (Baseline)</strong></td>
                                                            <td style={{textAlign: 'right', fontWeight: 700}} className={data.nav_return_pct >= 0 ? "tv-pos" : "tv-neg"}>
                                                                {data.nav_return_pct >= 0 ? '+' : ''}{data.nav_return_pct.toFixed(2)}%
                                                            </td>
                                                            <td style={{textAlign: 'right', color: 'var(--text-secondary)'}}>—</td>
                                                        </tr>
                                                        {data.stocks_performance.map(stock => (
                                                            <tr key={stock.ticker}>
                                                                <td style={{fontWeight: 500, color: '#ffffff'}}>{stock.ticker.split('.')[0]}</td>
                                                                <td style={{textAlign: 'right', fontFamily: 'monospace'}} className={stock.return_pct >= 0 ? "tv-pos" : "tv-neg"}>
                                                                    {stock.return_pct >= 0 ? '+' : ''}{stock.return_pct.toFixed(2)}%
                                                                </td>
                                                                <td style={{textAlign: 'right', fontFamily: 'monospace', fontWeight: 600}} className={stock.vs_nav_pct >= 0 ? "tv-pos" : "tv-neg"}>
                                                                    {stock.vs_nav_pct >= 0 ? '+' : ''}{stock.vs_nav_pct.toFixed(2)}%
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}
                                    </div>

                                    {/* Bottom TradingView-style Time Selector bar */}
                                    <div className="chart-timebar">
                                        <div className="timebar-ranges">
                                            {["1M", "3M", "6M", "YTD", "1Y", "All"].map(range => (
                                                <button
                                                    key={range}
                                                    className={`timebar-btn ${timeRange === range ? "active" : ""}`}
                                                    onClick={() => setTimeRange(range)}
                                                >
                                                    {range}
                                                </button>
                                            ))}
                                        </div>
                                        <div style={{fontSize: '0.75rem', color: 'var(--text-muted)'}}>
                                            Base Rebase Reference Price: INR {data.chart_data[0] ? (data.latest_nav / (data.chart_data[data.chart_data.length - 1]?.nav || 1) * 100).toFixed(1) : "—"}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
